<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulador NDS</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        EJS_player = "#game";
        EJS_core = "nds";  // Núcleo mais leve e sem dependência de melonds-wasm.data
        EJS_gameName = "Puzzle de Harvest Moon";
        EJS_color = "transparent";
        EJS_startOnLoaded = true;
        EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/"; // CDN oficial
        EJS_gameUrl = "puzzledeharvestmoon.nds"; // Caminho relativo à ROM no repositório

    // --- ADICIONE AS LINHAS ABAIXO ---
        EJS_disablePointerLock = true;  // Desativa a função de "prender" o mouse
        EJS_pauseOnBlur = false;       // Evita que o jogo pause quando a aba perde o foco
    // --------------------------------
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>

<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulador NDS</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; }
        #game { width: 100vw; height: 100vh; }

        #game canvas {
            pointer-events: none !important;
        }
        
        /* Quando o mouse está sobre o canvas com botão pressionado, permite interação */
        #game canvas:active {
            pointer-events: auto !important;
        }

        .ejs-toolbar {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        EJS_player = "#game";
        EJS_core = "desmume";  // Núcleo mais leve e sem dependência de melonds-wasm.data
        EJS_gameName = "Puzzle de Harvest Moon";
        EJS_color = "transparent";
        EJS_startOnLoaded = true;
        EJS_pathtodata = "data/";
        EJS_gameUrl = "puzzledeharvestmoon.nds";
        EJS_disablePointerLock = true;
        EJS_pauseOnBlur = false;
        EJS_toolbar = false;
        
        // Força a desativação do pointer lock após o emulador carregar
        window.addEventListener('load', function() {
            setTimeout(function() {
                // Remove qualquer evento de pointer lock
                const canvases = document.querySelectorAll('canvas');
                canvases.forEach(canvas => {
                    canvas.removeEventListener('click', () => {});
                    canvas.removeEventListener('mousedown', () => {});
                    canvas.style.pointerEvents = 'auto';
                });
                
                // Desativa o pointer lock no objeto do emulador se existir
                if (window.EJS_emulator) {
                    window.EJS_emulator.disablePointerLock = true;
                }
            }, 2000);
        });
        
        // Intercepta e bloqueia requisições de pointer lock
        document.addEventListener('pointerlockchange', function(e) {
            if (document.pointerLockElement) {
                document.exitPointerLock();
            }
        }, false);
        
        document.addEventListener('pointerlockerror', function(e) {
            console.log('Pointer lock bloqueado');
        }, false);
    </script>
    <script src="data/loader.js"></script>
</body>
</html>
